# For SwiftLint: 0.25.1
---
disabled_rules:
  - multiple_closures_with_trailing_closure
  - todo
  - superfluous_disable_command
  - legacy_random
excluded: # paths to ignore during linting. Takes precedence over `included`.
  - .build
  - .swiftpm
  - Package.swift
opt_in_rules:
  - closure_spacing
  - empty_count
  - explicit_init
  - force_unwrapping
  - implicitly_unwrapped_optional
cyclomatic_complexity:
  warning: 10
  error: 20 # swiftlint default
file_length:
  warning: 750
  error: 1000
function_parameter_count:
  warning: 8
  error: 15
line_length:
  warning: 150 # github line wrap
  error: 150
identifier_name:
  min_length:
    warning: 3
    error: 3
  max_length:
    warning: 50
    error: 60 # swiftlint default
nesting:
  type_level: 3
type_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 100
    error: 1000 # swiftlint default
vertical_whitespace:
  max_empty_lines: 2
