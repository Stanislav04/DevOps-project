    spec:
      containers:
        - name: revert
          image: culinary-chronicles-backend:latest
          env:
            - name: LOG_LEVEL
              value: debug
            - name: DATABASE_HOST
              value: db
            - name: DATABASE_NAME
              value: vapor_database
            - name: DATABASE_USERNAME
              value: vapor_username
            - name: DATABASE_PASSWORD
              value: vapor_password
          command: ["migrate", "--revert", "--yes"]
